{% extends 'auth_layout.html' %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="auth-form-container">
        <div class="auth-header">
            <h2 class="auth-title">Reset Password 🔑</h2>
            <p class="auth-subtitle">Enter your new password</p>
        </div>

        <form method="POST" id="password-reset-form">
            {% csrf_token %}
            
            <div class="form-group-modern mb-3">
                <label class="form-label-modern" for="password">
                    <i class="fas fa-lock"></i> New Password
                </label>
                <input type="password" name="password" id="password" class="form-control-modern"
                    placeholder="Min. 8 characters" required />
            </div>

            <div class="form-group-modern mb-4">
                <label class="form-label-modern" for="password2">
                    <i class="fas fa-lock"></i> Confirm New Password
                </label>
                <input type="password" name="password2" id="password2" class="form-control-modern"
                    placeholder="Re-enter password" required />
            </div>

            <button type="submit" id="submit-button" class="btn-modern btn-modern-primary w-100 mb-3">
                <i class="fas fa-check-circle"></i> Reset Password
            </button>

            <div class="auth-footer">
                <p>Remember your password? <a href="{% url 'auth' %}" class="btn-link-modern">Back to Login</a></p>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('password-reset-form').addEventListener('submit', function() {
        const submitButton = document.getElementById('submit-button');
        if (submitButton) {
            submitButton.disabled = true;
            submitButton.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Resetting...';
        }
    });
</script>
{% endblock %}
