{% extends 'auth_layout.html' %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="auth-form-container">
        <div class="auth-header">
            <h2 class="auth-title">Forgot Password? 🔐</h2>
            <p class="auth-subtitle">Enter your email to reset your password</p>
        </div>

        <form method="POST" id="forgot-password-form">
            {% csrf_token %}
            
            <div class="form-group-modern mb-4">
                <label class="form-label-modern" for="email">
                    <i class="fas fa-envelope"></i> Email Address
                </label>
                <input type="email" name="email" id="email" class="form-control-modern"
                    placeholder="you@example.com" required />
            </div>

            <button type="submit" id="submit-button" class="btn-modern btn-modern-primary w-100 mb-3">
                <i class="fas fa-paper-plane"></i> Send Reset Link
            </button>

            <div class="auth-footer">
                <p>Remember your password? <a href="{% url 'auth' %}" class="btn-link-modern">Back to Login</a></p>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.getElementById('forgot-password-form').addEventListener('submit', function() {
        const submitButton = document.getElementById('submit-button');
        if (submitButton) {
            submitButton.disabled = true;
            submitButton.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Sending...';
        }
    });
</script>
{% endblock %}
