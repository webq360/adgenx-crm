{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRM - {% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" >
    <link rel="stylesheet" href="{% static 'auth.css' %}">
</head>
<body>
<!-- Back to Home -->
<div style="position:fixed; top:1rem; left:1rem; z-index:9999;">
    <a href="{% url 'landing' %}" style="display:inline-flex; align-items:center; gap:.45rem; background:rgba(255,255,255,0.92); backdrop-filter:blur(8px); border:1px solid #e2e8f0; color:#4f46e5; text-decoration:none; padding:.45rem 1rem; border-radius:8px; font-size:.88rem; font-weight:600; box-shadow:0 2px 10px rgba(0,0,0,.08); transition:box-shadow .2s;">
        <i class="fas fa-arrow-left" style="font-size:.8rem;"></i> Home
    </a>
</div>
<section class="auth-section">
    <div class="container-fluid h-100">
        <div class="row h-100 align-items-center justify-content-center">
            <!-- Image Section - Hidden on Mobile -->
            <div class="col-lg-6 d-none d-lg-flex align-items-center justify-content-center image-section">
                <div class="image-wrapper">
                    <img loading="lazy" src="{% static 'draw2.webp' %}" class="img-fluid auth-image" alt="CRM Illustration">
                </div>
            </div>
            
            <!-- Form Section -->
            <div class="col-12 col-lg-6 d-flex align-items-center justify-content-center form-section">
                <div class="auth-container">
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                    
                    {% block content %}
                    {% endblock %}
                </div>
            </div>
        </div>
    </div>
</section>
{% block scripts %}
{% endblock %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLlvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
</body>
</html>
