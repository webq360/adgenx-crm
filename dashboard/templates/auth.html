{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM - Authentication</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" >
    <link rel="stylesheet" href="{% static 'auth.css' %}">
    
</head>
<body>
<section class="vh-100">
    <div class="container-fluid h-custom">
    <div class="row d-flex justify-content-center align-items-center h-100">
        <div class="col-md-9 col-lg-6 col-xl-5">
        <img loading="lazy" src="{% static 'draw2.webp' %}"
            class="img-fluid" alt="Sample image">
        </div>
        <div class="col-md-8 col-lg-6 col-xl-4 offset-xl-1">
        {% if messages %}
            {% for message in messages %}
                <div class="text-center alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}
        <div id="login-form">
            <form method="POST">
                {% csrf_token %}
                <input type="hidden" name="action" value="login">
                <!-- Email input -->
                <div data-mdb-input-init class="form-outline mb-3">
                    <label class="form-label" for="login-email">Email address</label>
                    <input type="email" autocomplete="off" name="email" id="login-email" class="form-control form-control-lg"
                        placeholder="Enter a valid email address" required />
                </div>

                <!-- Password input -->
                <div data-mdb-input-init class="form-outline mb-1">
                    <label class="form-label">Password</label>
                    <input type="password" autocomplete="off" name="password" class="form-control form-control-lg"
                        placeholder="Enter password" required />
                </div>
                
                <a href="#!" class="text-body mb-2 fs-6">Forgot password?</a>

                
            
                <div class="text-center text-lg-start mt-2">
                <button  type="submit" data-mdb-button-init data-mdb-ripple-init class="btn btn-primary btn-md fs-5"
                    style="padding-left: 2rem; padding-right: 2rem;">Login</button>
                <p class="small fw-bold mt-2 pt-1 mb-0">Don't have an account? <a href="#!"
                    class="link-danger" id="show-register">Register</a></p>
                </div>

                <!--
                <div class="divider d-flex align-items-center my-4">
                    <p class="text-center fw-bold mx-3 mb-0">Or</p>
                </div>

                <div class="d-flex flex-row align-items-center justify-content-center justify-content-lg-start">
                <p class="lead fw-normal mb-0 me-3">Sign in with</p>
                <button  type="button" data-mdb-button-init data-mdb-ripple-init class="btn btn-primary btn-floating mx-1">
                    <i class="fab fa-facebook-f"></i>
                </button>
                </div>
                -->

            </form>
            
        </div>

        <div id="register-form" style="display: none;">
            <form method="POST">
                {% csrf_token %}
                <input type="hidden" name="action" value="register">
                <!-- First name input -->
                <div data-mdb-input-init class="form-outline mb-3">
                    <label class="form-label" >First Name</label>
                    <input type="text" name="first_name" class="form-control form-control-lg"
                        placeholder="Enter your first name" required />
                </div>
                
                <!-- Last name input -->
                <div data-mdb-input-init class="form-outline mb-3">
                    <label class="form-label" >Last Name</label>
                    <input type="text" name="last_name" class="form-control form-control-lg"
                        placeholder="Enter your last name" required />
                </div>

                <!-- Email input -->
                <div data-mdb-input-init class="form-outline mb-3">
                    <label class="form-label" >Email address</label>
                    <input type="email" autocomplete="off" name="email" class="form-control form-control-lg"
                        placeholder="Enter a valid email address" required />
                </div>

                <!-- Phone Number input -->
                <div data-mdb-input-init class="form-outline mb-3">
                    <label class="form-label" >Whatsapp Number</label>
                    <input type="text" name="phone_number" class="form-control form-control-lg"
                        placeholder="Enter your phone number" required />
                </div>

                <!-- Password input -->
                <div data-mdb-input-init class="form-outline mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" autocomplete="off" name="password" class="form-control form-control-lg"
                        placeholder="Enter password" required />
                </div>
                
                <!-- Comfirm Password input -->
                <div data-mdb-input-init class="form-outline mb-3">
                    <label class="form-label" >Comfirm Password</label>
                    <input type="password" autocomplete="off" name="password2" class="form-control form-control-lg"
                        placeholder="Comfirm password" required />
                </div>

                <div class="text-center text-lg-start mt-2">
                <button  type="submit" data-mdb-button-init data-mdb-ripple-init class="btn btn-primary btn-md fs-5"
                    style="padding-left: 2rem; padding-right: 2rem;">Register</button>
                <p class="small fw-bold mt-2 pt-1 mb-0">Already have an account? <a href="#!"
                    class="link-danger" id="show-login">Login</a></p>
                </div>
                
                <!--
                <div class="divider d-flex align-items-center my-4">
                    <p class="text-center fw-bold mx-3 mb-0">Or</p>
                </div>

                <div class="d-flex flex-row align-items-center justify-content-center justify-content-lg-start">
                <p class="lead fw-normal mb-0 me-3">Sign up with</p>
                <button  type="button" data-mdb-button-init data-mdb-ripple-init class="btn btn-primary btn-floating mx-1">
                    <i class="fab fa-facebook-f"></i>
                </button>
                

                <button  type="button" data-mdb-button-init data-mdb-ripple-init class="btn btn-primary btn-floating mx-1">
                    <i class="fab fa-twitter"></i>
                </button>

                <button  type="button" data-mdb-button-init data-mdb-ripple-init class="btn btn-primary btn-floating mx-1">
                    <i class="fab fa-linkedin-in"></i>
                </button>
                </div>
                -->
            </form>
        </div>
        </div>
    </div>
    </div>
</section>
<script>
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const showRegister = document.getElementById('show-register');
    const showLogin = document.getElementById('show-login');

    showRegister.addEventListener('click', () => {
        loginForm.style.display = 'none';
        registerForm.style.display = 'block';
    });

    showLogin.addEventListener('click', () => {
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
</body>
</html>n="anonymous"></script>
</body>
</html>
