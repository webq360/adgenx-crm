{% extends 'layout.html' %}
{% load static %}

{% block styles %}
<link rel="stylesheet" href="{% static 'request_ad_account.css' %}">
{% endblock %}

{% block content %}
    <div class="container-fluid d-flex align-items-center justify-content-center py-4">
        <div class="form-container p-4 p-md-5" style="width: 100%; max-width: 600px;">
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="header-title mb-0">Create new ad account</h2>
                <button type="button" class="close-btn" onclick="window.history.back()">
                    <i class="bi bi-x"></i>
                </button>
            </div>
            
            <!-- Form -->
            <form method="post" action="{% url 'request_ad_account' %}">
                {% csrf_token %}
                <!-- Suggested Ads Account Name -->
                <div class="mb-4">
                    <label for="accountName" class="form-label">Suggested Ads Account Name</label>
                    <input type="text" class="form-control" id="accountName" name="accountName" placeholder="Insert suggested ads account name" required>
                </div>
                
                <!-- Client's BM ID -->
                <div class="mb-4">
                    <label for="bmId" class="form-label">Client's BM ID</label>
                    <input type="text" class="form-control" id="bmId" name="bmId" placeholder="Insert BM ID of client" required>
                </div>

                
                <!-- FB Page Link -->
                <div class="mb-4">
                    <label for="fbPageLink" class="form-label">FB Page Link</label>
                    <input type="url" class="form-control" id="fbPageLink" name="fbPageLink" placeholder="Insert fb page Link" required>
                </div>
                
                <!-- this should be monthly budget -->
                <div class="mb-4">
                    <label for="monthly_budget" class="form-label">Monthly Budget</label>
                    <div class="input-group">
                        <span class="input-group-text" style="border-radius: 10px 0 0 10px; border: 2px solid #e9ecef; border-right: none;">$</span>
                        <input type="number" class="form-control" id="monthly_budget" name="monthly_budget" placeholder="0.00" step="0.01" style="border-radius: 0 10px 10px 0; border-left: none;" required>
                    </div>
                </div>
                
                <!-- Campaign Start Date -->
                <div class="mb-4">
                    <label for="startDate" class="form-label">Campaign Start Date</label>
                    <input type="date" class="form-control" id="startDate" name="startDate" required>
                </div>
                
                <!-- Submit Button -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">
                        Submit Request
                        <i class="bi bi-arrow-right ms-2"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
