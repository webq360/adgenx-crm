{% extends 'layout.html' %}
{% load static %}

{% block styles %}
<style>
.form-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
            background: linear-gradient(45deg, #5a6fd8, #6a42a0);
        }
        
        .form-control, .form-select {
            border-radius: 10px;
            border: 2px solid #e9ecef;
            padding: 12px 16px;
            transition: all 0.3s ease;
        }
        
        .form-control:hover, .form-select:hover {
            border-color: #667eea;
        }
        
        .form-label {
            font-weight: 600;
            color: #495057;
            margin-bottom: 8px;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: #6c757d;
            transition: color 0.3s ease;
        }
        
        .close-btn:hover {
            color: #495057;
        }
        
        .header-title {
            color: #2c3e50;
            font-weight: 700;
            font-size: 1.5rem;
        }
</style>
{% endblock %}

{% block content %}
    <div class="container-fluid d-flex align-items-center justify-content-center min-vh-100 py-4">
        <div class="form-container p-4 p-md-5" style="width: 100%; max-width: 600px;">
            <!-- Header -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="header-title mb-0">Create new ad account</h2>
                <button type="button" class="close-btn" onclick="window.history.back()">
                    <i class="bi bi-x"></i>
                </button>
            </div>
            
            <!-- Form -->
            <form method="post" action="{% url 'request_ad_account' %}">
                {% csrf_token %}
                <!-- Suggested Ads Account Name -->
                <div class="mb-4">
                    <label for="accountName" class="form-label">Suggested Ads Account Name</label>
                    <input type="text" class="form-control" id="accountName" name="accountName" placeholder="Insert suggested ads account name">
                </div>

                <!-- Ad Account ID -->
                <div class="mb-4">
                    <label for="accId" class="form-label">Ad Account ID</label>
                    <input type="text" class="form-control" id="accId" name="accId" placeholder="Insert Ad Account ID">
                </div>
                
                <!-- Client's BM ID -->
                <div class="mb-4">
                    <label for="bmId" class="form-label">Client's BM ID</label>
                    <input type="text" class="form-control" id="bmId" name="bmId" placeholder="Insert BM ID of client">
                </div>
                
                <!-- FB Page Link -->
                <div class="mb-4">
                    <label for="fbPageLink" class="form-label">FB Page Link</label>
                    <input type="url" class="form-control" id="fbPageLink" name="fbPageLink" placeholder="Insert fb page Link">
                </div>
                
                <!-- Monthly Budget -->
                <div class="mb-4">
                    <label for="monthlyBudget" class="form-label">Monthly Budget</label>
                    <div class="input-group">
                        <span class="input-group-text" style="border-radius: 10px 0 0 10px; border: 2px solid #e9ecef; border-right: none;">$</span>
                        <input type="number" class="form-control" id="monthlyBudget" name="monthlyBudget" placeholder="0.00" step="0.01" style="border-radius: 0 10px 10px 0; border-left: none;">
                    </div>
                </div>
                
                <!-- Campaign Start Date -->
                <div class="mb-4">
                    <label for="startDate" class="form-label">Campaign Start Date</label>
                    <input type="date" class="form-control" id="startDate" name="startDate">
                </div>
                
                <!-- Submit Button -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">
                        Submit Request
                        <i class="bi bi-arrow-right ms-2"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
{% endblock %}
