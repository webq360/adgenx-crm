{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet" >
    <link rel="stylesheet" href="{% static 'styles.css' %}">
    {% block styles %}
    {% endblock %}
    <script src="{% static 'main.js' %}" defer></script>
</head>
<body>
    <div class="d-flex">
    <!-- Sidebar -->
    <aside class="sidebar d-flex flex-column justify-content-between">
    <div>
        <div class="d-flex justify-content-center align-items-center border-bottom border-2 border-gray-200" style="height: 4rem;">
        <img src="https://storage.googleapis.com/a1aa/image/3cf7344e-a050-424a-a893-b87d7ece095b.jpg" alt="Company logo with text 'salef'" width="32" height="32" style="object-fit: contain;" />
        </div>
        <nav class="nav flex-column mt-3 px-3 gap-2" aria-label="Main Menu">
        <a href="/" class="nav-link active d-flex align-items-center gap-2" aria-current="page">
            <svg xmlns="http://www.w3.org/2000/svg" class="menu-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7" rx="1" ry="1"></rect>
            <rect x="14" y="3" width="7" height="7" rx="1" ry="1"></rect>
            <rect x="14" y="14" width="7" height="7" rx="1" ry="1"></rect>
            <rect x="3" y="14" width="7" height="7" rx="1" ry="1"></rect>
            </svg>
            Overview
        </a>
        <a href="#" class="nav-link d-flex align-items-center gap-2 fw-semibold ad-accounts-link">
            Ad Accounts
        </a>
        <a href="/deposit" class="nav-link d-flex align-items-center gap-2 fw-semibold text-dark">
            Deposit
        </a>
        <a href="#" class="nav-link d-flex align-items-center gap-2 fw-semibold text-dark">
            Finance
            <svg xmlns="http://www.w3.org/2000/svg" class="ms-auto" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true" style="width: 1rem; height: 1rem; color: #9ca3af;">
            <path d="M19 9l-7 7-7-7" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
        </a>
        </nav>
    </div>
    <div class="others-menu mt-auto px-3 pb-3">
        <p class="text-secondary small fw-semibold mb-2">Others Menu</p>
        <a href="#" class="d-flex align-items-center gap-2 fw-semibold text-dark text-decoration-none mb-2">
        <i class="fas fa-headphones-alt"></i>
        Support Inbox
        </a>
        <a href="#" class="d-flex align-items-center gap-2 fw-semibold text-dark text-decoration-none">
        <i class="fas fa-cog"></i>
        Settings
        </a>
    </div>
    </aside>

    <!-- Main content -->
    <div class="flex-grow-1 d-flex flex-column">
    <!-- Topbar -->
    <header class="topbar d-flex justify-content-between align-items-center px-3">
        <div class="topbar-left d-flex align-items-center gap-2">
        <button type="button" aria-label="Toggle sidebar" class="btn-icon" style="padding: 0.375rem;">
            <svg xmlns="http://www.w3.org/2000/svg" class="menu-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
        </button>
        <div class="position-relative">
            <input type="search" class="input-search" placeholder="Search anything..." aria-label="Search anything" />
            <div class="position-absolute top-50 end-0 translate-middle-y pe-2 text-secondary small" style="user-select:none;">⌘ K</div>
        </div>
        </div>
        <div class="topbar-right d-flex align-items-center gap-3 position-relative">
            <button type="button" class="btn-support">
                <i class="fas fa-headphones-alt"></i> Support
            </button>
            <button type="button" aria-label="Notifications" class="btn-icon position-relative">
                <i class="fas fa-bell"></i>
                <span class="notification-badge"></span>
            </button>
            <button type="button" aria-label="User menu" class="avatar">
                <img src="https://img.icons8.com/?size=100&id=60655&format=png&color=000000" alt="User profile picture, circular avatar with gray background and text 'User'" />
            </button>
        </div>
    </header>

    {% block content %}
    {% endblock %}

    </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
</body>
</html>
